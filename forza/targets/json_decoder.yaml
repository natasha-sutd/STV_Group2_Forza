name: json_decoder

buggy_cmd:
  windows: ["python", "json_decoder_stv.py", "--str-json", "{input}"]
  mac: ["uv", "run", "json_decoder_stv.py", "--str-json", "{input}"]
buggy_cwd: "../../json-decoder"

# input
input_mode: arg
seeds_path: ../inputs/json_decoder/seeds.txt
input:
  type: random_object
  max_fields: 5
  key:
    type: string
    min: 1
    max: 10
  value:
    type: one_of
    options:
      # valid types
      - type: int
        min: 0
        max: 1000
      - type: string
        min: 1
        max: 10
      - type: boolean
      - type: array
        min_length: 2
        max_length: 5
        element:
          type: int
          min: 0
          max: 10
      - type: sequence
        parts:
          - type: int
            min: 0
            max: 10
          - type: literal
            value: ","
          - type: int
            min: 0
            max: 10
      # invalid types for fuzzing
      - type: int # out-of-range
        min: 1001
        max: 2000   
      - type: string # empty string
        min: 0
        max: 0      
      - type: literal # random literal
        value: "??"  
      - type: boolean

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "bug has been triggered"
  - "invalidity bug"
  - "Traceback (most recent call last)"

# differential output comparison
output_pattern: "Output decoded data: {value} of type"

# coverage
coverage_enabled: true
coverage_flag: "--show-coverage"
tracking_mode: code_execution
seed_count: 30
