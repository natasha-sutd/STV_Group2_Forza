name: ipv4_parser

# commands
buggy_cmd:
  windows:
    ["../IPv4-IPv6-parser-main/bin/win-ipv4-parser.exe", "--ipstr", "{input}"]
  linux: ["./bin/linux-ipv4-parser", "--ipstr", "{input}"]
  mac: ["./bin/mac-ipv4-parser", "--ipstr", "{input}"]
buggy_cwd: "../../IPv4-IPv6-parser-main"

reference_cmd:
  windows: ["python", "ipv4_parser.py", "{input}"]
  linux: ["python3", "ipv4_parser.py", "{input}"]
  mac: ["python3", "ipv4_parser.py", "{input}"]
reference_cwd: "../../IPv4-IPv6-parser-main/ipyparse/src"

# input
input_mode: arg
input:
  type: sequence
  separator: "."
  count: 4
  element:
    type: int
    min: 0
    max: 255
seeds_path: "../inputs/ipv4_parser/seeds.txt"

# special bug keywords
bug_keywords:
  - "ParseException"

# differential output comparison
output_pattern: "Output: [{value}]"

# coverage
coverage_enabled: false
tracking_mode: code_execution
blackbox_instrumentation:
  enabled: true
  kind: afl_showmap
  kind_windows: frida_stalker
  frida_config:
    target_module: "win-ipv4-parser.exe"
    exclude_modules:
      - "ntdll.dll"
      - "kernel32.dll"
      - "kernelbase.dll"
      - "ucrtbase.dll"
  cmd:
    windows:
      ["wsl", "--cd", "{buggy_cwd_wsl}", "afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/linux-ipv4-parser", "--ipstr", "{input}"]
    linux:
      ["afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/linux-ipv4-parser", "--ipstr", "{input}"]
    mac:
      ["afl-showmap", "-Q", "-m", "none", "-o", "{map_file}", "--", "./bin/mac-ipv4-parser", "--ipstr", "{input}"]
  timeout: 20
  timeout_windows: 60
