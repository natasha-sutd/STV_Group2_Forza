name: ipv6_parser

buggy_cmd: 
  windows: ["../IPv4-IPv6-parser-main/bin/win-ipv4-parser.exe", "--ipstr", "{input}"]
  mac: ["./bin/mac-ipv6-parser", "--ipstr", "{input}"]
buggy_cwd: "../../IPv4-IPv6-parser-main"

# input
input_mode: arg
seeds_path: "../inputs/ipv6_parser/seeds.txt"
input:
  type: sequence
  parts:
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid
    - type: literal
      value: ":"
    - type: one_of
      options:
        - type: hex
          min: 0
          max: 65535   # valid
        - type: hex
          min: 65536
          max: 99999   # invalid

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "invalidity"
  - "bonus"
  - "Traceback (most recent call last)"

# differential output comparison
output_pattern: "Output: [{value}]"

# coverage
coverage_enabled: false
tracking_mode: behavioral
seed_count: 30