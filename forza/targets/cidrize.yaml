name: cidrize

buggy_cmd: 
  windows: ["../cidrize-runner-main/bin/win-cidrize-runner.exe", "--func", "cidrize", "--ipstr", "{input}"]
  mac: ["../cidrize-runner-main/bin/mac-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}"]
buggy_cwd: "../../cidrize-runner-main"

# input
input_mode: arg
seeds_path: "../inputs/cidrize/seeds.txt"
input:
  type: sequence
  parts:
    - type: sequence
      count: 4
      separator: "."
      element: { type: int, min: 0, max: 255 }
    - type: literal
      value: "/"
    - type: int
      min: 0
      max: 32

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "bug has been triggered"
  - "syntactic"
  - "functional"
  - "Traceback"
  - "Error"
  - "invalidity bug"
  - "InvalidCidrFormatError"
  - "AddrFormatError"
  - "Traceback (most recent call last)"

# differential output comparison
output_pattern: "IPNetwork('{value}')"

# coverage
coverage_enabled: false
tracking_mode: behavioral
seed_count: 30