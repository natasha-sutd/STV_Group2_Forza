name: cidrize

buggy_cmd: 
  windows: ["../cidrize-runner-main/bin/win-cidrize-runner.exe", "--func", "cidrize", "--ipstr", "{input}"]
  mac: ["../cidrize-runner-main/bin/mac-cidrize-runner", "--func", "cidrize", "--ipstr", "{input}"]
buggy_cwd: "../../cidrize-runner-main"

# input
input_mode: arg
seeds_path: "../inputs/cidrize/seeds.txt"
input:
  type: sequence
  parts:
    - type: one_of
      options:
        - type: int
          min: 0
          max: 255
        - type: int
          min: 256
          max: 999   # invalid octet
    - type: literal
      value: "."
    - type: one_of
      options:
        - type: int
          min: 0
          max: 255
        - type: int
          min: 256
          max: 999   # invalid octet
    - type: literal
      value: "."
    - type: one_of
      options:
        - type: int
          min: 0
          max: 255
        - type: int
          min: 256
          max: 999   # invalid octet
    - type: literal
      value: "."
    - type: one_of
      options:
        - type: int
          min: 0
          max: 255
        - type: int
          min: 256
          max: 999   # invalid octet
    # Slash separator
    - type: literal
      value: "/"
    # Mask part
    - type: one_of
      options:
        - type: int
          min: 0
          max: 32   # valid mask
        - type: int
          min: 33
          max: 64   # invalid mask

# execution
timeout: 60

# bug detection
detection_mode: keyword
bug_keywords:
  - "bug has been triggered"
  - "syntactic"
  - "functional"
  - "Traceback"
  - "Error"
  - "invalidity bug"
  - "InvalidCidrFormatError"
  - "AddrFormatError"
  - "Traceback (most recent call last)"

# coverage
coverage_enabled: false
tracking_mode: behavioral
seed_count: 30